<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auralab — Tu Sistema de Vida</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;--bg2:#13131c;--bg3:#1a1a26;--bg4:#22223a;
  --surface:#1e1e2e;--surface2:#252538;--surface3:#2d2d45;
  --border:#2e2e46;--border2:#3a3a58;
  --text:#e8e8f0;--text2:#9090b0;--text3:#5a5a78;
  --accent:#7c5cfc;--accent2:#9b7dff;--accent-glow:rgba(124,92,252,.25);
  --green:#22d3a5;--red:#ff5a5a;--amber:#f59e0b;--blue:#38bdf8;
  --r:10px;--r2:16px;--r3:20px;--sidebar:230px;
}
[data-light="true"]{
  --bg:#f0f0f8;--bg2:#e8e8f4;--bg3:#dddde8;--bg4:#d0d0e0;
  --surface:#ffffff;--surface2:#f5f5fc;--surface3:#ebebf8;
  --border:#d8d8ea;--border2:#c8c8dc;
  --text:#1a1a2e;--text2:#50507a;--text3:#9090a8;
  --accent-glow:rgba(107,76,232,.12);
}
body[data-accent="teal"]{--accent:#14b8a6;--accent2:#2dd4bf;--accent-glow:rgba(20,184,166,.25)}
body[data-accent="blue"]{--accent:#3b82f6;--accent2:#60a5fa;--accent-glow:rgba(59,130,246,.25)}
body[data-accent="rose"]{--accent:#f43f5e;--accent2:#fb7185;--accent-glow:rgba(244,63,94,.25)}
body[data-accent="amber"]{--accent:#f59e0b;--accent2:#fbbf24;--accent-glow:rgba(245,158,11,.25)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* SIDEBAR */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:50;overflow-y:auto}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#c084fc);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#fff;flex-shrink:0}
.logo-text{font-size:21px;font-weight:800;background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.xp-bar-wrap{padding:10px 14px;border-bottom:1px solid var(--border)}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
.xp-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .6s ease}
.nav-group{padding:6px 10px 2px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;font-weight:700;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;margin:1px 6px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .18s;border:1px solid transparent;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-user{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#c084fc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}

/* MAIN */
#main{flex:1;height:100vh;overflow-y:auto;background:var(--bg)}
.topbar{position:sticky;top:0;z-index:40;background:var(--bg);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
.topbar-title{font-size:17px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:18px 22px;max-width:1400px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:border .2s}
.card:hover{border-color:var(--border2)}
.card-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;font-weight:700}

/* GRIDS */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}.g12,.g21{grid-template-columns:1fr}}

/* METRICS */
.mval{font-size:28px;font-weight:800;line-height:1.1}
.mlabel{font-size:11px;color:var(--text2);margin-top:4px}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.blue{color:var(--blue)}.accent{color:var(--accent2)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(34,211,165,.15);color:var(--green)}
.br{background:rgba(255,90,90,.15);color:var(--red)}
.ba{background:rgba(245,158,11,.15);color:var(--amber)}
.bac{background:var(--accent-glow);color:var(--accent2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all .18s;font-weight:500;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btnp{background:var(--accent);border-color:var(--accent);color:#fff}
.btnp:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btns{padding:5px 10px;font-size:12px}
.btnd{background:rgba(255,90,90,.1);border-color:rgba(255,90,90,.3);color:var(--red)}
.btnd:hover{background:rgba(255,90,90,.2)}
.btnico{padding:5px;width:28px;height:28px;justify-content:center;font-size:13px}

/* INPUTS */
input,textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border .2s;font-family:inherit;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
input[type=range]{padding:0;background:transparent;accent-color:var(--accent)}
input[type=date]{color-scheme:dark}

/* PROGRESS */
.ptrack{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .6s ease}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
th{background:var(--bg3);color:var(--text2);padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:var(--surface2)}
tfoot td{background:var(--bg3);font-weight:700;color:var(--accent2);border-top:2px solid var(--border2)}

/* TABS */
.tabs{display:flex;gap:3px;padding:4px;background:var(--bg3);border-radius:11px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:7px 8px;font-size:12px;font-weight:500;border-radius:8px;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:transparent;font-family:inherit;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* HEATMAP */
.heatmap{display:flex;gap:2px;flex-wrap:wrap}
.hmc{width:13px;height:13px;border-radius:2px;transition:all .15s;cursor:pointer;flex-shrink:0}
.hmc:hover{transform:scale(1.4)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{min-height:72px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px;font-size:11px;cursor:pointer;transition:border .2s;position:relative}
.cal-day:hover{border-color:var(--accent)}
.cal-today{border-color:var(--accent)!important;background:var(--accent-glow)!important}
.cal-empty{background:transparent!important;border-color:transparent!important;cursor:default}
.cal-num{font-weight:700;margin-bottom:2px;font-size:12px}
.cal-evt{background:var(--accent);color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-selected{border-color:var(--green)!important;background:rgba(34,211,165,.08)!important}

/* CHAT */
.chat-area{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto;padding:4px 2px}
.cmsg{display:flex;gap:8px;align-items:flex-start}
.cmsg.user{flex-direction:row-reverse}
.cbubble{max-width:82%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.cmsg.ai .cbubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:3px}
.cmsg.user .cbubble{background:var(--accent);color:#fff;border-top-right-radius:3px}
.cavatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid var(--border);background:var(--surface2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:22px;width:500px;max-width:96vw;max-height:90vh;overflow-y:auto;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.frow{margin-bottom:12px}
.flabel{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}

/* GAMIFICATION */
#xp-toast{position:fixed;top:18px;right:18px;background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 18px;display:none;z-index:9999;box-shadow:0 4px 24px var(--accent-glow);font-size:14px;font-weight:600}
#str-toast{position:fixed;bottom:24px;right:18px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:12px;padding:12px 20px;display:none;z-index:9999;color:#fff;font-weight:700;font-size:14px;box-shadow:0 4px 24px rgba(249,115,22,.5)}
@keyframes toastIn{from{transform:translateX(100px);opacity:0}to{transform:none;opacity:1}}
@keyframes toastOut{to{transform:translateX(100px);opacity:0}}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;display:none}

/* SWITCH */
.sw{position:relative;width:40px;height:21px;display:inline-flex;align-items:center;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{position:absolute;inset:0;background:var(--bg4);border-radius:21px;cursor:pointer;transition:.28s}
.sw-track:before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.28s}
.sw input:checked+.sw-track{background:var(--accent)}
.sw input:checked+.sw-track:before{transform:translateX(19px)}

/* SCORE RING */
.sring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.sring-num{position:absolute;font-size:22px;font-weight:800;line-height:1}

/* MUSCLE BAR */
.mbar{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mbar-name{width:95px;font-size:11px;color:var(--text2);flex-shrink:0}
.mbar-fill{height:8px;border-radius:4px;transition:width .7s ease}
.mbar-val{font-size:11px;color:var(--text2);min-width:30px;text-align:right}

/* MINI STAT */
.mstat{padding:10px 12px;background:var(--bg3);border-radius:9px;border:1px solid var(--border);text-align:center}
.mstat-val{font-size:22px;font-weight:800;line-height:1.2}
.mstat-lbl{font-size:10px;color:var(--text2);margin-top:3px}

/* RADAR SVG text */
.section-enter{animation:secIn .22s ease}
@keyframes secIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* WORKOUT */
.ex-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border2);border-radius:var(--r2);padding:28px;text-align:center}
.w-input{font-size:42px;font-weight:800;text-align:center;background:var(--bg3);border:2px solid var(--border2);border-radius:14px;padding:10px;color:var(--text);width:160px;transition:border .2s}
.w-input:focus{border-color:var(--accent)}

/* GOAL ITEM */
.goal-item{padding:13px;background:var(--bg3);border-radius:9px;margin-bottom:8px;border:1px solid var(--border)}

/* TX ITEM */
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}

/* COLOR SWATCHES */
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;transition:transform .15s,border .15s;border:3px solid transparent}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:var(--text)!important}

/* CHART CONTAINERS */
.ch{position:relative;width:100%}
.ch-200{height:200px}
.ch-160{height:160px}
.ch-260{height:260px}
</style>
</head>
<body data-accent="purple">

<canvas id="confetti"></canvas>
<div id="xp-toast">⚡ +<span id="xp-amt">50</span> XP — <span id="xp-rsn">¡Logro!</span></div>
<div id="str-toast">🏋️ ¡NUEVO RÉCORD PERSONAL! +1 Moneda de Fuerza 💪</div>

<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">A</div>
    <div>
      <div class="logo-text">Auralab</div>
      <div style="font-size:10px;color:var(--text3)">Sistema de Vida v2.0</div>
    </div>
  </div>
  <div class="xp-bar-wrap">
    <div class="xp-label">
      <span id="lv-label">Nivel 7 · Guerrero</span>
      <span id="xp-display">2,340 XP</span>
    </div>
    <div class="xp-track"><div class="xp-fill" id="xpbar" style="width:64%"></div></div>
    <div style="font-size:10px;color:var(--text3);margin-top:3px;text-align:right">3,660 para Nivel 8</div>
  </div>
  <div id="nav"></div>
  <div class="nav-user">
    <div class="avatar">U</div>
    <div>
      <div style="font-size:12px;font-weight:600">Usuario</div>
      <div style="font-size:10px;color:var(--amber)">💰 <span id="coins-nav">12</span> Monedas de Fuerza</div>
    </div>
  </div>
</div>

<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">📊 Tablero</div>
    <div class="topbar-right">
      <span style="font-size:12px;color:var(--text2)" id="cur-date"></span>
      <button class="btn btns" onclick="goTo('settings')">⚙️ Ajustes</button>
    </div>
  </div>
  <div class="content" id="app"></div>
</div>

<script>
// ─── STORE ───────────────────────────────────────────────────────────────────
const S = {
  xp: 2340, strengthCoins: 12, section: 'dashboard',
  tasks: [], habits: [], habitLog: {},
  routines: [], transactions: [], goals: [],
  calEvents: {}, agencyFlights: [], agencyHotels: [], externalFlights: [],
  physicalMetrics: { weight: 78, weeklyVolume: 4.2, score: 82, workouts: 14 },
  chatHistory: [{ role: 'ai', text: 'Hola! Soy tu Segundo Cerebro. Puedo analizar tus finanzas, resumir tus metas, crear planes de entrenamiento y mucho más. ¿Qué necesitas hoy?' }],
  resetPeriod: 'monthly', lastReset: tod()
};

function tod(){ return new Date().toISOString().split('T')[0]; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fc(n){ return '$'+parseFloat(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fn(n,d=2){ return parseFloat(n||0).toFixed(d); }

// ─── NAV ─────────────────────────────────────────────────────────────────────
const SECTIONS = [
  {id:'dashboard',icon:'📊',label:'Tablero',g:'Principal'},
  {id:'habits',icon:'🎯',label:'Hábitos',g:'Principal'},
  {id:'physical',icon:'💪',label:'Físico',g:'Entrenamiento'},
  {id:'routines',icon:'🏋️',label:'Rutinas',g:'Entrenamiento'},
  {id:'financial',icon:'💳',label:'Financiero',g:'Gestión'},
  {id:'agency',icon:'✈️',label:'Agencia',g:'Gestión'},
  {id:'brain',icon:'🧠',label:'Segundo Cerebro',g:'IA'},
  {id:'goals',icon:'🚀',label:'Metas',g:'Personal'},
  {id:'calendar',icon:'📅',label:'Calendario',g:'Personal'},
  {id:'settings',icon:'⚙️',label:'Apariencia',g:'Sistema'},
];
const TITLES = { dashboard:'📊 Tablero', habits:'🎯 Hábitos', physical:'💪 Pilar Físico', routines:'🏋️ Rutinas', financial:'💳 Financiero', agency:'✈️ Módulo Agencia', brain:'🧠 Segundo Cerebro', goals:'🚀 Metas', calendar:'📅 Calendario', settings:'⚙️ Apariencia' };

function buildNav(){
  const nav = document.getElementById('nav');
  const groups = {};
  SECTIONS.forEach(s => { if(!groups[s.g]) groups[s.g]=[]; groups[s.g].push(s); });
  let html = '';
  Object.entries(groups).forEach(([g,items]) => {
    html += `<div class="nav-group">${g}</div>`;
    items.forEach(it => {
      html += `<div class="nav-item${S.section===it.id?' active':''}" onclick="goTo('${it.id}')">
        <span class="nav-icon">${it.icon}</span><span>${it.label}</span></div>`;
    });
  });
  nav.innerHTML = html;
}
function goTo(id){
  S.section = id;
  document.getElementById('page-title').textContent = TITLES[id]||id;
  buildNav();
  render();
}

// ─── GAMIFICATION ────────────────────────────────────────────────────────────
function showXP(amt, reason){
  S.xp += amt;
  const el = document.getElementById('xp-toast');
  document.getElementById('xp-amt').textContent = amt;
  document.getElementById('xp-rsn').textContent = reason;
  document.getElementById('xp-display').textContent = S.xp.toLocaleString()+' XP';
  document.getElementById('xpbar').style.width = ((S.xp%1000)/10)+'%';
  el.style.display='block'; el.style.animation='toastIn .3s ease';
  launchConfetti();
  setTimeout(()=>{ el.style.animation='toastOut .4s forwards'; setTimeout(()=>{ el.style.display='none'; el.style.animation=''; }, 400); }, 3000);
}
function showStrength(){
  S.strengthCoins++;
  document.getElementById('coins-nav').textContent = S.strengthCoins;
  const el = document.getElementById('str-toast');
  el.style.display='block'; el.style.animation='toastIn .3s ease';
  setTimeout(()=>{ el.style.animation='toastOut .4s forwards'; setTimeout(()=>{ el.style.display='none'; el.style.animation=''; }, 400); }, 3500);
}
function launchConfetti(){
  const c = document.getElementById('confetti');
  c.style.display='block';
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx = c.getContext('2d');
  const cols=['#7c5cfc','#22d3a5','#f59e0b','#ff5a5a','#38bdf8','#c084fc'];
  const pts = Array.from({length:120},()=>({ x:Math.random()*c.width, y:-10, r:Math.random()*6+3, col:cols[Math.floor(Math.random()*cols.length)], vx:(Math.random()-.5)*7, vy:Math.random()*4+2, rot:Math.random()*360, vr:Math.random()*6-3 }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.col; ctx.globalAlpha=Math.max(0,1-f/80); ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); ctx.restore(); p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=.06; });
    f++;
    if(f<90) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,c.width,c.height); c.style.display='none'; }
  })();
}

// ─── SCORE RING ───────────────────────────────────────────────────────────────
function scoreRing(score, size=90, col='var(--accent)'){
  const r=36, circ=2*Math.PI*r, dash=circ*(score/100);
  return `<div class="sring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="8"/>
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="8"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        style="transform:rotate(-90deg);transform-origin:50px 50px;transition:stroke-dasharray .8s ease"/>
    </svg>
    <div class="sring-num">${score}</div>
  </div>`;
}

// ─── RADAR SVG ────────────────────────────────────────────────────────────────
function radarSVG(data, size=180){
  const cats=['Físico','Mental','Finanzas','Hábitos','Metas','Social'];
  const n=cats.length; const cx=size/2, cy=size/2, r=size/2-28;
  function polar(i,v){ const a=(i/n)*2*Math.PI-Math.PI/2; return {x:cx+v*r*Math.cos(a), y:cy+v*r*Math.sin(a)}; }
  const poly = data.map((v,i)=>{ const p=polar(i,v/100); return `${p.x},${p.y}`; }).join(' ');
  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
  [.25,.5,.75,1].forEach(l => {
    const pp = cats.map((_,i)=>{ const p=polar(i,l); return `${p.x},${p.y}`; }).join(' ');
    svg += `<polygon points="${pp}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  });
  cats.forEach((_,i) => { const p=polar(i,1); svg += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`; });
  svg += `<polygon points="${poly}" fill="rgba(124,92,252,.22)" stroke="rgba(124,92,252,.85)" stroke-width="1.5"/>`;
  data.forEach((v,i) => { const p=polar(i,v/100); svg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#9b7dff"/>`; });
  cats.forEach((c,i) => { const p=polar(i,1.25); svg += `<text x="${p.x}" y="${p.y}" font-size="9" fill="rgba(255,255,255,.45)" text-anchor="middle" dominant-baseline="middle" font-family="Segoe UI,sans-serif">${c}</text>`; });
  return svg + '</svg>';
}

// ─── HEATMAP ─────────────────────────────────────────────────────────────────
function heatmap(log){
  const days=[];
  for(let i=89;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().split('T')[0]); }
  return `<div class="heatmap">${days.map(k=>{
    const v=log[k]||0;
    const bg=v===0?'var(--bg4)':v===1?'rgba(124,92,252,.3)':v===2?'rgba(124,92,252,.58)':'rgba(124,92,252,.9)';
    return `<div class="hmc" style="background:${bg}" title="${k}: ${v} hábitos"></div>`;
  }).join('')}</div>`;
}

        </div>
      </div>
      <button class="btn btnp" style="width:100%;font-size:15px;padding:12px" onclick="logSet()">

window.exitWorkout=function(){ _activeRoutine=null; render(); };
window.logSet=function(){
  const w=parseFloat(document.getElementById('w-input')?.value||0);
  if(!w)return;
  const ex=_activeRoutine.exercises[_currentEx];
  if(w>ex.prRecord){
    S.routines=S.routines.map(r=>r.id===_activeRoutine.id?{...r,exercises:r.exercises.map(e=>e.id===ex.id?{...e,prRecord:w}:e)}:r);
    _activeRoutine={..._activeRoutine,exercises:_activeRoutine.exercises.map(e=>e.id===ex.id?{...e,prRecord:w}:e)};
    showStrength(); showXP(100,'¡Nuevo récord personal!');
  }
  const next=_currentEx+1;
  if(next<_activeRoutine.exercises.length){ _currentEx=next; viewWorkoutActive(); }
  else{ _activeRoutine=null; showXP(150,'¡Entrenamiento completado!'); render(); }
};

  if(pv>0&&calc){ calc.style.display='block';
    if(isExt){ document.getElementById('ag-rl').textContent=fc(pv*.20); document.getElementById('ag-gn').textContent=fc(pv-cp-pv*.20); }
    else{ document.getElementById('ag-si').textContent=fc(pv*.2976); document.getElementById('ag-rl').textContent=fc(pv*.20); document.getElementById('ag-gn').textContent=fc(pv-pv*.2976-pv*.20); }
  }
};
window.saveAgRow=function(){

function viewBrain(){

    {l:'📈 Estrategia financiera',q:'Sugiere una estrategia de ahorro e inversión para este mes.'},
    {l:'🗓 Planifica mi semana',q:'Ayúdame a planificar una semana productiva.'},
  ];

  document.getElementById('app').innerHTML=`<div class="section-enter">
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#c084fc);display:flex;align-items:center;justify-content:center;font-size:20px">🧠</div>
      <div><div style="font-weight:700;font-size:15px">Segundo Cerebro</div><div style="font-size:11px;color:var(--green)">● Conectado · Claude Sonnet 4</div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${CMDS.map(c=>`<button class="btn btns" onclick="sendBrain(${JSON.stringify(c.q)})">${c.l}</button>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="chat-area" id="chat-area">
      ${S.chatHistory.map(m=>`
      <div class="cmsg ${m.role}">
        <div class="cavatar">${m.role==='ai'?'🧠':'👤'}</div>
        <div class="cbubble">${m.text.replace(/</g,'&lt;')}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <input id="brain-input" placeholder="Pregunta algo a tu Segundo Cerebro..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendBrain()}"/>
      <button class="btn btnp" onclick="sendBrain()" id="send-btn">➜</button>
    </div>
  </div>
  </div>`;

  scrollChat();
}

window.sendBrain=async function(text){
  const inp=document.getElementById('brain-input');
  const msg=text||(inp?.value?.trim());
  if(!msg)return;
  if(inp) inp.value='';
  S.chatHistory.push({role:'user',text:msg});
  appendChatMsg('user',msg);
  const btn=document.getElementById('send-btn');
  if(btn){ btn.disabled=true; btn.textContent='...'; }
  const typingId='typing-'+Date.now();
  appendChatMsg('ai','Pensando...',typingId);

  try{
    const sys=`Eres el "Segundo Cerebro" de Auralab. Ayudas con desarrollo personal, fitness, finanzas y productividad.
Datos del usuario: XP: ${S.xp}, Monedas de Fuerza: ${S.strengthCoins}, Hábitos: ${S.habits.length}, Rutinas: ${S.routines.length}, Transacciones: ${S.transactions.length}, Metas: ${S.goals.length}.
Responde en español, conciso (máx. 3 párrafos), útil y motivador.`;
    const messages=S.chatHistory.slice(0,-1).slice(-8).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
    messages.push({role:'user',content:msg});

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages})
    });
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'No pude procesar esa solicitud.';
    S.chatHistory.push({role:'ai',text:reply});
    removeMsg(typingId);
    appendChatMsg('ai',reply);
  }catch(e){
    removeMsg(typingId);
    appendChatMsg('ai','Error de conexión. Verifica tu API key o conexión a internet.');
  }
  if(btn){ btn.disabled=false; btn.textContent='➜'; }
};

function appendChatMsg(role,text,id){
  const area=document.getElementById('chat-area');
  if(!area)return;
  const div=document.createElement('div');
  div.className=`cmsg ${role}`;
  if(id) div.id=id;
  div.innerHTML=`<div class="cavatar">${role==='ai'?'🧠':'👤'}</div><div class="cbubble">${text.replace(/</g,'&lt;')}</div>`;
  area.appendChild(div);
  scrollChat();
}
function removeMsg(id){ document.getElementById(id)?.remove(); }
function scrollChat(){ const a=document.getElementById('chat-area'); if(a) a.scrollTop=a.scrollHeight; }

// ─── CALENDARIO ───────────────────────────────────────────────────────────────
let _calYear=new Date().getFullYear(), _calMonth=new Date().getMonth(), _calSelDay=null;
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function viewCalendar(){
  const y=_calYear, m=_calMonth;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today_=new Date();
  const isToday_=(d)=>d===today_.getDate()&&m===today_.getMonth()&&y===today_.getFullYear();
  const dayKey=(d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const selectedKey=_calSelDay?dayKey(_calSelDay):null;
  const selEvents=selectedKey?(S.calEvents[selectedKey]||[]):[];

  document.getElementById('app').innerHTML=`<div class="section-enter">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button class="btn btns" onclick="calNav(-1)">‹ Anterior</button>
      <div style="font-weight:700;font-size:16px">${MONTHS[m]} ${y}</div>
      <button class="btn btns" onclick="calNav(1)">Siguiente ›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">
      ${DOWS.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text3);font-weight:700;padding:3px 0">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${cells.map((d,i)=>{
        if(!d) return `<div class="cal-day cal-empty"></div>`;
        const k=dayKey(d);
        const events=S.calEvents[k]||[];
        const cls=['cal-day', isToday_(d)?'cal-today':'', _calSelDay===d?'cal-selected':''].filter(Boolean).join(' ');
        return `<div class="${cls}" onclick="selectCalDay(${d})">
          <div class="cal-num" style="color:${isToday_(d)?'var(--accent2)':'var(--text2)'}">${d}</div>
          ${events.slice(0,2).map(e=>`<div class="cal-evt">${e.text}</div>`).join('')}
          ${events.length>2?`<div style="font-size:9px;color:var(--text3)">+${events.length-2}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    ${_calSelDay?`
    <div style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)">
      <div style="font-weight:700;margin-bottom:10px;font-size:14px">📅 ${_calSelDay} de ${MONTHS[m]}</div>
      ${selEvents.length===0?'<div style="font-size:13px;color:var(--text3);margin-bottom:8px">Sin eventos</div>':''}
      ${selEvents.map(e=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px">📌 ${e.text}</span>
        <button class="btn btns btnd btnico" onclick="deleteCalEvent('${selectedKey}','${e.id}')">✕</button>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:10px">
        <input id="ev-input" placeholder="Agregar evento..." onkeydown="if(event.key==='Enter')addCalEvent('${selectedKey}')" style="flex:1"/>
        <button class="btn btns btnp" onclick="addCalEvent('${selectedKey}')">+ Añadir</button>
      </div>
    </div>`:'<div style="margin-top:12px;font-size:12px;color:var(--text3);text-align:center">Haz clic en un día para agregar eventos</div>'}
  </div>
  </div>`;
}
window.calNav=function(d){ _calMonth+=d; if(_calMonth<0){_calMonth=11;_calYear--;} if(_calMonth>11){_calMonth=0;_calYear++;} _calSelDay=null; render(); };
window.selectCalDay=function(d){ _calSelDay=_calSelDay===d?null:d; render(); };
window.addCalEvent=function(key){ const txt=document.getElementById('ev-input')?.value?.trim(); if(!txt)return; if(!S.calEvents[key])S.calEvents[key]=[]; S.calEvents[key].push({id:uid(),text:txt}); render(); };
window.deleteCalEvent=function(key,id){ S.calEvents[key]=(S.calEvents[key]||[]).filter(e=>e.id!==id); render(); };
